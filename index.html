<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />

  <!-- iPad PWA / Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Axis &amp; Allies" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Apple touch icons (will use favicon fallback until proper icons added) -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />

  <title>Axis &amp; Allies 1942</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ocean:   #0a1e3a;
      --bg:      #0a1628;
      --panel:   #111e30;
      --border:  #1e3a5a;
      --text:    #d4c9a8;
      --dim:     #6a7a8a;
      --accent:  #c8a040;
      --danger:  #cc3333;
      --safe:    #3aaa44;
      --hud-h:   52px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
    }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      gap: 16px;
    }
    #loading h1 { font-size: 2rem; color: var(--accent); letter-spacing: 3px; text-align: center; }
    #loading p  { color: var(--dim); font-size: 0.9rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <h1>⚔ AXIS &amp; ALLIES</h1>
      <p>1942 — Second Edition</p>
      <div class="spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
